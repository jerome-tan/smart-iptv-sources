name: Refresh Curated Sources (Manual)

# ⚠️ 已迁移到本地 Cron（每天凌晨 3 点，Hermes 调度）
# 此 Workflow 仅保留手动触发作为备用

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ee9139deeec8d018acdfb0b8c2f9d31c
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate curated playlist with stream checks
        run: python3 generate.py --check-streams

      - name: Validate generated output
        run: python3 validate.py

      - name: Deploy generated output to Cloudflare Pages
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: >-
          npx --yes wrangler pages deploy public
          --project-name smart-iptv-sources
          --branch main
          --commit-hash "$GITHUB_SHA"
          --commit-message "chore: refresh curated IPTV sources"
          --commit-dirty=true

      - name: Commit refreshed output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/index.json public/version.json public/health.json public/playlists/stable-cn.m3u public/epg/stable-cn.xml.gz
          if git diff --cached --quiet; then
            echo "No source changes to commit."
          else
            git commit -m "chore: refresh curated IPTV sources"
            git push
          fi
